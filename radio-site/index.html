<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Wave - Canlı Radyo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📻</text></svg>">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <header class="glass-header">
    <div class="logo">
      <span class="logo-icon">📻</span>
      <h1>Radio Wave</h1>
    </div>
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span>CANLI</span>
    </div>
    <div class="listener-count">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span id="listenerCount">--</span> dinleyici
    </div>
  </header>

  <main class="main-layout">
    <section class="player-section">
      <div class="glass-player">
        <div class="album-art-container">
          <div class="album-art" id="albumArt">
            <div class="album-art-placeholder">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            </div>
          </div>
          <div class="vinyl-disc" id="vinylDisc">
            <div class="vinyl-inner"></div>
          </div>
        </div>

        <div class="song-info">
          <div class="now-playing-label">Şu An Çalıyor</div>
          <h2 class="song-title" id="songTitle">Şarkı Yükleniyor...</h2>
          <p class="song-artist" id="songArtist">-</p>
          <p class="song-album" id="songAlbum"></p>
        </div>

        <div class="progress-container">
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-glow" id="progressGlow"></div>
          </div>
          <div class="progress-times">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button class="control-btn" id="prevBtn" title="Önceki">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="control-btn play-btn" id="playBtn" title="Oynat/Duraklat">
            <svg class="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg class="pause-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="control-btn" id="nextBtn" title="Sonraki">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
        </div>

        <div class="secondary-controls">
          <button class="ctrl-btn" id="shuffleBtn" title="Karıştır">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </button>
          <button class="ctrl-btn" id="repeatBtn" title="Tekrarla">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
          <div class="volume-control">
            <button class="ctrl-btn" id="muteBtn" title="Sessiz">
              <svg class="vol-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              <svg class="vol-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
            </button>
            <input type="range" id="volumeSlider" min="0" max="100" value="80" class="volume-slider">
          </div>
        </div>
      </div>
    </section>

    <section class="showcase-section">
      <div class="glass-showcase">
        <div class="showcase-header">
          <h3>🎵 Playlist</h3>
          <div class="playlist-tabs" id="playlistTabs">
            <button class="tab-btn active" data-playlist="pop">Pop</button>
            <button class="tab-btn" data-playlist="rock">Rock</button>
            <button class="tab-btn" data-playlist="jazz">Jazz</button>
          </div>
        </div>

        <div class="showcase-now">
          <div class="showcase-now-label">Şu An Çalıyor</div>
          <div class="showcase-now-info" id="showcaseNowInfo">
            <div class="showcase-now-art" id="showcaseNowArt">🎵</div>
            <div class="showcase-now-text">
              <span class="showcase-now-title" id="showcaseNowTitle">Yükleniyor...</span>
              <span class="showcase-now-artist" id="showcaseNowArtist">-</span>
            </div>
            <div class="showcase-eq">
              <span class="eq-bar"></span>
              <span class="eq-bar"></span>
              <span class="eq-bar"></span>
              <span class="eq-bar"></span>
              <span class="eq-bar"></span>
            </div>
          </div>
        </div>

        <div class="playlist-container" id="playlistContainer">
          <div class="playlist-list" id="playlistList">
            <!-- Songs will be injected here -->
          </div>
        </div>

        <div class="showcase-footer">
          <div class="playlist-stats">
            <span id="songCount">0 şarkı</span>
            <span class="separator">•</span>
            <span id="totalDuration">0:00</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="glass-footer">
    <p>Radio Wave &copy; 2026 &mdash; Powered by Cloudflare R2 &bull; Herkes aynı anda aynı müziği dinler</p>
  </footer>

  <audio id="audioPlayer" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
